<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Vérification — Myyn</title>
<style>
  /* Fond crème Myyn : la page est rendue dans une WebView de l'app (challenge
     interactif éventuel) — elle doit rester sobre et charte-compliant. */
  html, body { margin: 0; height: 100%; background: #FBF6EC; }
  body { display: flex; align-items: center; justify-content: center; }
</style>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onTs" async defer></script>
</head>
<body>
<div id="ts"></div>
<script>
  // Pont WebView → app (react-native-webview). Hors app : no-op (page testable
  // dans un navigateur : le token s'affiche en console).
  function post(m) {
    try {
      if (window.ReactNativeWebView) window.ReactNativeWebView.postMessage(JSON.stringify(m));
      else console.log('[turnstile]', m);
    } catch (e) {}
  }
  function onTs() {
    var p = new URLSearchParams(location.search);
    turnstile.render('#ts', {
      sitekey: p.get('sitekey') || '0x4AAAAAADwCjePx_ThcDY0x',
      // Managed : Cloudflare décide ; l'app est prévenue si une interaction
      // devient nécessaire (elle rend alors la WebView visible).
      'before-interactive-callback': function () { post({ type: 'interactive' }); },
      callback: function (t) { post({ type: 'token', token: t }); },
      'error-callback': function (c) { post({ type: 'error', code: String(c || '') }); return true; },
      'expired-callback': function () { post({ type: 'expired' }); },
      theme: 'light',
      appearance: 'always'
    });
  }
</script>
</body>
</html>
