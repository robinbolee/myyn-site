<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Myyn — Le jeu de cartes de ta bande</title>
<meta property="og:title" content="Tu as reçu une carte sur Myyn">
<meta property="og:description" content="Chaque jour, offre des cartes à ton entourage et collectionne celles que les autres pensent que tu mérites.">
<meta property="og:type" content="website">
<style>
  :root{--cream:#FBF6EC;--ink:#2A2218;--taupe:#6B6152;--coral:#E07856;--border:#E7DECB;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--cream);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.6;display:flex;min-height:100vh;align-items:center;justify-content:center;text-align:center;}
  .wrap{max-width:440px;padding:40px 26px;}
  .logo{font-family:Georgia,"Times New Roman",serif;font-size:2.6rem;font-weight:700;letter-spacing:-.5px;margin:0 0 6px;}
  .cards{font-size:2rem;margin-bottom:18px;}
  h1{font-family:Georgia,serif;font-size:1.55rem;margin:0 0 10px;line-height:1.25;}
  p{color:var(--taupe);font-size:1.05rem;margin:0 0 28px;}
  .btn{display:inline-block;background:var(--coral);color:#fff;text-decoration:none;font-weight:600;padding:15px 30px;border-radius:30px;font-size:1.05rem;}
  .btn2{display:inline-block;margin-top:14px;color:var(--coral);text-decoration:none;font-weight:600;font-size:.95rem;}
  .note{margin-top:22px;font-size:.85rem;color:var(--taupe);}
  .foot{margin-top:40px;font-size:.8rem;}
  .foot a{color:var(--coral);text-decoration:none;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">Myyn</div>
  <div class="cards">🎴</div>
  <h1>Le jeu de cartes de ta bande</h1>
  <p>Chaque jour, ouvre un pack, offre des cartes à tes proches, et collectionne celles que les autres pensent que tu mérites.</p>
  <a class="btn" id="primaryBtn" href="https://apps.apple.com/app/id6782846530">Installer Myyn</a>
  <a class="btn2" id="secondaryBtn" href="#" style="display:none"></a>
  <div class="note" id="note">Disponible sur iPhone et Android.</div>
  <div class="foot">
    <a href="https://myyn.app/confidentialite.html">Confidentialité</a> ·
    <a href="https://myyn.app/cgu.html">CGU</a> ·
    <a href="https://myyn.app/mentions-legales.html">Mentions légales</a>
  </div>
</div>
<script>
  (function(){
    var STORE = {
      ios:     'https://apps.apple.com/app/id6782846530',
      android: 'https://play.google.com/store/apps/details?id=com.myyn.app'
    };
    var ua = navigator.userAgent || navigator.vendor || '';
    var isIOS = /iPad|iPhone|iPod/.test(ua) ||
                (/Macintosh/.test(ua) && typeof document !== 'undefined' && 'ontouchend' in document);
    var isAndroid = /android/i.test(ua);
    var os = isIOS ? 'ios' : (isAndroid ? 'android' : 'desktop');

    var primary = document.getElementById('primaryBtn');
    var secondary = document.getElementById('secondaryBtn');
    var note = document.getElementById('note');

    if (os === 'desktop') {
      primary.setAttribute('href', STORE.ios);
      primary.textContent = 'Voir Myyn sur l’App Store';
      secondary.setAttribute('href', STORE.android);
      secondary.textContent = 'Ou sur Google Play →';
      secondary.style.display = 'inline-block';
      note.innerHTML = 'Ouvre myyn.app depuis ton téléphone pour installer l’app en un tap.';
    } else {
      primary.setAttribute('href', STORE[os]);
      primary.textContent = 'Installer Myyn';
    }
  })();
</script>
</body>
</html>
